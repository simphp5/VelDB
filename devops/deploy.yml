name: Deploy to Staging

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: devops/docker-compose.yml
          push: true
          tags: |
            simphx5/veldb-backend:staging-${{ github.sha }}
            simphx5/veldb-rust-engine:staging-${{ github.sha }}

      - name: Deploy to staging server
        env:
          STAGING_SERVER: ${{ secrets.STAGING_SERVER }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          echo "$STAGING_SSH_KEY" > staging_key.pem
          chmod 600 staging_key.pem
          ssh -o StrictHostKeyChecking=no -i staging_key.pem $STAGING_USER@$STAGING_SERVER << 'EOF'
            cd /opt/veldb-staging
            docker compose pull
            docker compose up -d
            docker compose ps
          EOF