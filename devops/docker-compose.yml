services:

  api:
    image: node:18
    working_dir: /app
    volumes:
      - ../api:/app
    command: npm start
    ports:
      - "3000:3000"

  redis:
    image: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"