name: VelDB CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  docker-build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build Docker images
        run: docker compose -f devops/docker-compose.yml build

      - name: Start services
        run: docker compose -f devops/docker-compose.yml up -d

      - name: Wait for backend startup
        run: |
          for i in {1..30}; do
            if curl -sS http://localhost:3000 > /dev/null; then
              echo "Backend is reachable"
              exit 0
            fi
            echo "Waiting for backend... (${i}/30)"
            sleep 2
          done
          echo "Backend did not become reachable in time"
          docker compose -f devops/docker-compose.yml logs --no-color
          exit 1

      - name: Optional API tests
        run: |
          if [ -f api/package.json ]; then
            docker compose -f devops/docker-compose.yml exec -T backend npm test --if-present
          else
            echo "No api/package.json found; skipping tests"
          fi

      - name: Show service status
        if: always()
        run: docker compose -f devops/docker-compose.yml ps

      - name: Show logs on failure
        if: failure()
        run: docker compose -f devops/docker-compose.yml logs --no-color

      - name: Tear down services
        if: always()
        run: docker compose -f devops/docker-compose.yml down -v --remove-orphans
